<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Tags</title>
</head>

<body>
    <h1>SEMANTIC TAGS</h1>
    <header>
        <h2>Home</h2>
        <h2>About</h2>
        <h2>Contact</h2>
    </header>
    <!--<nav> tag HTML me navigation links (menu) ko define karne ke liye use hota hai.-->

    <nav>
        <a href="home.html">Home</a> |
        <a href="about.html">About</a> |
        <a href="services.html">Services</a> |
        <a href="contact.html">Contact</a>
    </nav>
    <!--<article> tag HTML me independent content jaise blog post ya news article ko represent karne ke liye use hota hai.-->
    <article>
        <h2>My First Blog</h2>
        <p>This is my first blog post about web development.</p>
    </article>
    <!--<section> tag HTML me webpage ko different sections me divide karne ke liye use hota hai.-->
    <section>
        <h2>About Us</h2>
        <p>We are learning web development.</p>
    </section>
    <!--<aside> tag HTML me main content ke side me related ya additional information dikhane ke liye use hota hai.-->
    <aside>
        <h3>Related Links</h3>
        <p>Learn more about HTML and CSS.</p>
    </aside>
    <!--<figure> tag image ya diagram ko group karne ke liye use hota hai jabke <figcaption> us image ka caption ya description dene ke liye use hota hai-->
    <figure>
        <img src="flower.jpg" alt="Flower" width="200">
        <figcaption>This is a beautiful flower.</figcaption>
    </figure>
    <time datetime="2026-03-10">10 March 2026</time>
    <p>Event date: <time datetime="2026-03-10">10 March 2026</time></p>
</body>

</html>
