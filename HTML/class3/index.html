<!-- Image, Lists, and Tables -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image

    </title>
</head>

<body>
    <!-- IMAGE -->
    <img src="image.png" alt="Car image">
    <!-- Tables -->
    <table>
        <caption>Employee Detail</caption>
        <thead>
            <tr>
                <th>NAME</th>
                <th>JOB</th>
                <th>LANGUAGE</th>

            </tr>
            <tr>
                <td>Zainab</td>
                <td>Programmer</td>
                <td>HTML</td>
            </tr>

            <tr>
                <td colspan="2">Ayesha</td>
                <!--Do colum ki jagah ly ga or agr do rows ki jagah leni ha to rospan aye ga-->

                <td>Java</td>
            </tr>
        </thead>
        <tfoot>
            <tr>
                <td>Zainab</td>
                <td>Programmer</td>
                <td>HTML</td>
            </tr>

        </tfoot>
    </table>

    <!--   Lists  -->
    <ul type="square"> <!--UnOrdered List-->
        <!---types me hum or b bht kuch add kr sktay han
Type	Result
1	Numbers (1, 2, 3)
A	Capital letters (A, B, C)
a	Small letters (a, b, c)
I	Capital Roman numbers (I, II, III)
i	Small Roman numbers (i, ii, iii)-->
        <li>Hlo</li>
        <li>Bye</li>
        <li>Ok</li>
    </ul>
    <ol><!--Ordered List-->
        <li>Hlo</li>
        <li>Bye</li>
        <li>Ok</li>
    </ol>
</body>

</html>
